# Build and deploy the Observable Framework dashboard to GitHub Pages.
#
# The site lives in /site, reads data from /data/processed/*, and builds a
# fully static bundle into site/dist/. That bundle is then published to the
# Pages environment via actions/deploy-pages.
#
# Trigger: push to main that touches the site or the underlying dataset.
# Also runnable manually via the Actions tab ("Run workflow").
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/processed/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deployment at a time; cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
